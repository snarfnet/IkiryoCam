name: IkiryoCam
options:
  bundleIdPrefix: com.tokyonasu
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: false
targets:
  IkiryoCam:
    type: application
    platform: iOS
    sources: [IkiryoCam]
    settings:
      base:
        INFOPLIST_FILE: IkiryoCam/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.tokyonasu.ikiryocam
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 83VGKGSQUH
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
